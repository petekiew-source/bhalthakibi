<script>
    // 1. Connection Config
    const SUPABASE_URL = 'https://fyuxvsrcvuheeryrncfc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5dXh2c3JjdnVoZWVyeXJuY2ZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTU1MDMsImV4cCI6MjA5NzY5MTUwM30.eSvp9Wi-IbgrQ6WhziyQlcg3OjZ6ikua8gWmIlnIuIA';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log("System Initialized.");

    let mediaRecorder;
    let audioChunks = [];
    let audioFormat = 'audio/webm'; // Default format

    async function handleRecord() {
        const btn = document.getElementById('record-btn');
        const status = document.getElementById('status-text');

        if (!mediaRecorder || mediaRecorder.state === 'inactive') {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Check if device is Apple/Safari and adjust format
                if (MediaRecorder.isTypeSupported('audio/mp4')) {
                    audioFormat = 'audio/mp4';
                }

                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    // Turn off the microphone light on the browser/phone
                    stream.getTracks().forEach(track => track.stop());
                    uploadToDatabase();
                };
                
                mediaRecorder.start();
                btn.innerText = "Recording...";
                btn.classList.replace('bg-[#B68D77]', 'bg-red-500');
                status.innerText = "Speak now...";
                
            } catch (err) {
                console.error("Mic error:", err);
                alert("Microphone access denied or not supported on this browser.");
            }
        } else {
            // STOP RECORDING
            mediaRecorder.stop();
            btn.innerText = "Speak";
            btn.classList.replace('bg-red-500', 'bg-[#B68D77]');
            status.innerText = "Saving...";
        }
    }

    async function uploadToDatabase() {
        const status = document.getElementById('status-text');
        const audioBlob = new Blob(audioChunks, { type: audioFormat });
        
        // Use .mp4 extension if Apple, otherwise .webm
        const extension = audioFormat.includes('mp4') ? 'mp4' : 'webm';
        const fileName = `note_${Date.now()}.${extension}`;

        const { data, error } = await supabase.storage
            .from('voice-notes')
            .upload(fileName, audioBlob);

        if (error) {
            console.error("Upload error:", error);
            status.innerText = "Error saving. Check console.";
        } else {
            status.innerText = "Saved successfully!";
            console.log("Success:", data);
        }
    }
</script>

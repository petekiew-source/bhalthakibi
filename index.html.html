<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHAL PRA THAKIBI DEH!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #3bdce2; color: #FFFFFF; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; }
        .hidden { display: none !important; }
        .title-font { font-family: 'Montserrat', sans-serif; font-weight: 900; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between relative p-6 select-none w-full">

    <canvas id="water-canvas" class="fixed inset-0 w-full h-full pointer-events-none z-0"></canvas>

    <main class="flex-1 flex flex-col items-center justify-center w-full z-10 relative">
        
        <div id="home-screen" class="text-center w-full max-w-3xl flex flex-col items-center justify-center space-y-8">
            <div class="space-y-4 w-full overflow-hidden">
                <h1 class="text-2xl sm:text-4xl md:text-5xl lg:text-6xl tracking-tight uppercase text-white title-font leading-none whitespace-nowrap">BHAL PRA THAKIBI DEH!</h1>
                <p class="text-xl md:text-2xl text-white font-medium tracking-wide">A place to say goodbye</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-6 justify-center items-center w-full sm:w-auto">
                <button onclick="showScreen('record-screen')" class="px-8 py-4 w-full sm:w-auto border border-white rounded-full hover:bg-white hover:text-[#3bdce2] transition-all duration-300 text-white font-medium text-lg bg-[#3bdce2]/20 backdrop-blur-sm">
                    Say your goodbye
                </button>
                <button onclick="showScreen('listen-screen'); fetchRandomGoodbye();" class="px-8 py-4 w-full sm:w-auto border border-white rounded-full hover:bg-white hover:text-[#3bdce2] transition-all duration-300 text-white font-medium text-lg bg-[#3bdce2]/20 backdrop-blur-sm">
                    Hear a stranger's goodbye
                </button>
            </div>
            
            <p class="text-base md:text-lg text-white font-normal tracking-wide">Anonymous. No account. No data. Just your voice.</p>
        </div>

        <div id="record-screen" class="hidden flex-col items-center justify-center w-full max-w-md h-full text-center space-y-12">
            <button onclick="showScreen('home-screen')" class="absolute top-2 left-2 text-base tracking-wide text-white hover:opacity-60 transition-opacity">← Back</button>
            
            <h2 class="text-3xl md:text-4xl font-normal tracking-wide text-white">Say your goodbye</h2>
            
            <div id="progress-container" class="w-64 h-0.5 bg-white/25 rounded-full opacity-0 transition-opacity duration-300 mx-auto">
                <div id="progress-bar" class="h-full bg-white w-full transition-all duration-1000 ease-linear rounded-full"></div>
            </div>
            
            <div class="h-32 flex items-center justify-center">
                <button id="start-btn" onclick="startRecording()" class="w-20 h-20 bg-white rounded-full hover:scale-105 transition-transform shadow-md" aria-label="Start recording"></button>
                <button id="stop-btn" onclick="stopRecording()" class="hidden w-16 h-16 bg-white rounded-md animate-pulse shadow-md" aria-label="Stop recording"></button>
            </div>
            
            <p id="record-status" class="text-xl md:text-2xl text-white font-normal px-4 leading-relaxed">Press the white circle to speak your heart</p>
        </div>

        <div id="listen-screen" class="hidden flex-col items-center justify-center w-full max-w-md h-full text-center space-y-12">
            <button onclick="showScreen('home-screen')" class="absolute top-2 left-2 text-base tracking-wide text-white hover:opacity-60 transition-opacity">← Back</button>

            <p id="listen-status" class="text-2xl md:text-3xl text-white font-normal tracking-wide px-4">Finding a voice...</p>

            <div id="audio-player-container" class="hidden flex flex-col items-center w-full space-y-12">
                <audio id="audio-player" autoplay crossorigin="anonymous" class="hidden"></audio>
                
                <canvas id="waveform-canvas" class="w-64 h-16 mx-auto"></canvas>
                
                <button onclick="fetchRandomGoodbye()" class="px-8 py-3 text-base border border-white rounded-full hover:bg-white hover:text-[#3bdce2] transition-all duration-300 text-white font-medium">
                    Hear another
                </button>
            </div>
        </div>
    </main>

    <footer id="site-footer" class="w-full text-center pb-4 z-10 relative pointer-events-none">
        <p class="text-xs sm:text-sm text-white italic font-light tracking-wide opacity-95">
            In loving memory of my dearest sister Liethonuo "Sunny" Kiewhuo 1992-2026
        </p>
    </footer>

    <script>
        // --- Supabase Initialization ---
        const SUPABASE_URL = 'https://fyuxvsrcvuheeryrncfc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5dXh2c3JjdnVoZWVyeXJuY2ZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTU1MDMsImV4cCI6MjA5NzY5MTUwM30.eSvp9Wi-IbgrQ6WhziyQlcg3OjZ6ikua8gWmIlnIuIA';
        
        let supabaseClient;
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (error) {
            console.error("Supabase failed to initialize:", error);
        }

        // --- Live Organic Water Ripple Physics Logic ---
        const waterCanvas = document.getElementById('water-canvas');
        const waterCtx = waterCanvas.getContext('2d');
        let ripples = [];

        function resizeWaterCanvas() {
            waterCanvas.width = window.innerWidth;
            waterCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeWaterCanvas);
        resizeWaterCanvas();

        let lastX = 0, lastY = 0;
        window.addEventListener('mousemove', (e) => {
            const distance = Math.hypot(e.clientX - lastX, e.clientY - lastY);
            
            // Increased movement distance spacing for an open, clean pond feeling
            if (distance > 24) { 
                // Math.random() introduces chaotic nature profiles to every wave generation
                const randomMax = (window.innerWidth > 768 ? 90 : 65) + Math.random() * 60;
                const randomSpeed = 0.45 + Math.random() * 0.4; // Halved baseline speed for a peaceful flow
                const randomOpacity = 0.22 + Math.random() * 0.12; 

                ripples.push({
                    x: e.clientX,
                    y: e.clientY,
                    radius: 1,
                    maxRadius: randomMax,
                    baseOpacity: randomOpacity,
                    opacity: randomOpacity,
                    speed: randomSpeed,
                    lineWidth: 1.2 + Math.random() * 1.5 // Custom varied profile thickness
                });
                lastX = e.clientX;
                lastY = e.clientY;
            }
        });

        function animateWater() {
            waterCtx.clearRect(0, 0, waterCanvas.width, waterCanvas.height);
            for (let i = ripples.length - 1; i >= 0; i--) {
                let r = ripples[i];
                r.radius += r.speed;
                r.opacity = r.baseOpacity * (1 - r.radius / r.maxRadius);
                
                if (r.opacity <= 0) {
                    ripples.splice(i, 1);
                    continue;
                }
                
                // Primary surface crest line
                waterCtx.beginPath();
                waterCtx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                waterCtx.strokeStyle = `rgba(255, 255, 255, ${r.opacity})`;
                waterCtx.lineWidth = r.lineWidth;
                waterCtx.stroke();

                // Echo trailing secondary ring for depth reflection
                if (r.radius > 22) {
                    waterCtx.beginPath();
                    waterCtx.arc(r.x, r.y, r.radius - 22, 0, Math.PI * 2);
                    waterCtx.strokeStyle = `rgba(255, 255, 255, ${r.opacity * 0.35})`;
                    waterCtx.lineWidth = r.lineWidth * 0.5;
                    waterCtx.stroke();
                }
            }
            requestAnimationFrame(animateWater);
        }
        animateWater();


        // --- Audio Waveform Visualizer Logic ---
        let audioCtx;
        let analyser;
        let source;
        let waveformCanvas;
        let waveformCtx;

        function initAudioVisualizer() {
            if (audioCtx) return; 
            
            const audioPlayer = document.getElementById('audio-player');
            waveformCanvas = document.getElementById('waveform-canvas');
            waveformCtx = waveformCanvas.getContext('2d');
            
            waveformCanvas.width = 256;
            waveformCanvas.height = 64;

            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 64; 
                
                source = audioCtx.createMediaElementSource(audioPlayer);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                
                drawWaveform();
            } catch (e) {
                console.error("Audio Context visualizer initialization bypassed cleanly:", e);
            }
        }

        function drawWaveform() {
            requestAnimationFrame(drawWaveform);
            if (!analyser || !waveformCtx) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const w = waveformCanvas.width;
            const h = waveformCanvas.height;
            waveformCtx.clearRect(0, 0, w, h);

            const barWidth = 5;
            const gap = 4;
            const totalBars = 16; 
            const startX = (w - (totalBars * (barWidth + gap))) / 2;

            waveformCtx.fillStyle = '#FFFFFF';

            for (let i = 0; i < totalBars; i++) {
                const dataIndex = Math.abs(i - Math.floor(totalBars / 2));
                const value = dataArray[dataIndex] || 0;
                const barHeight = Math.max(3, (value / 255) * h * 0.85);
                
                const x = startX + i * (barWidth + gap);
                const y = (h - barHeight) / 2; 

                waveformCtx.beginPath();
                waveformCtx.roundRect(x, y, barWidth, barHeight, 2.5);
                waveformCtx.fill();
            }
        }


        // --- Navigation ---
        function showScreen(screenId) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('record-screen').classList.add('hidden');
            document.getElementById('listen-screen').classList.add('hidden');
            
            if (screenId === 'home-screen') {
                document.getElementById('site-footer').classList.remove('hidden');
                const audioPlayer = document.getElementById('audio-player');
                audioPlayer.pause();
                audioPlayer.src = "";
            } else {
                document.getElementById('site-footer').classList.add('hidden');
            }
            
            if(screenId === 'record-screen') {
                document.getElementById('record-status').innerText = "Press the white circle to speak your heart";
                document.getElementById('progress-container').classList.add('opacity-0');
                document.getElementById('progress-bar').style.width = '100%';
            }
            
            document.getElementById(screenId).classList.remove('hidden');
        }

        // --- Recording Logic ---
        let mediaRecorder;
        let audioChunks = [];
        let timerInterval;
        let timeLeft = 90;

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = handleUpload;
                
                document.getElementById('start-btn').classList.add('hidden');
                document.getElementById('stop-btn').classList.remove('hidden');
                document.getElementById('record-status').innerText = "Recording...";
                
                timeLeft = 90;
                document.getElementById('progress-bar').style.width = '100%';
                document.getElementById('progress-container').classList.remove('opacity-0');
                
                mediaRecorder.start();

                timerInterval = setInterval(() => {
                    timeLeft--;
                    const percentage = (timeLeft / 90) * 100;
                    document.getElementById('progress-bar').style.width = percentage + '%';
                    
                    if (timeLeft <= 0) stopRecording();
                }, 1000);

            } catch (err) {
                document.getElementById('record-status').innerText = "Microphone access denied.";
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                clearInterval(timerInterval);
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                
                document.getElementById('stop-btn').classList.add('hidden');
                document.getElementById('start-btn').classList.remove('hidden');
                document.getElementById('record-status').innerText = "Uploading your goodbye...";
                document.getElementById('progress-container').classList.add('opacity-0');
            }
        }

        async function handleUpload() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const fileName = Date.now() + '-' + Math.random().toString(36).substring(7) + '.webm';

            const { data: uploadData, error: uploadError } = await supabaseClient.storage
                .from('goodbyes')
                .upload(fileName, audioBlob);

            if (uploadError) {
                document.getElementById('record-status').innerText = "Upload failed. Please try again.";
                return;
            }

            const { data: urlData } = supabaseClient.storage.from('goodbyes').getPublicUrl(fileName);
            const { error: dbError } = await supabaseClient.from('goodbyes').insert([{ audio_url: urlData.publicUrl }]);

            if (dbError) {
                document.getElementById('record-status').innerText = "Error saving. Let me know.";
            } else {
                document.getElementById('record-status').innerText = "Your goodbye has been released into the world.";
            }
        }

        // --- Listening Logic ---
        async function fetchRandomGoodbye() {
            initAudioVisualizer();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            document.getElementById('listen-status').innerText = "Finding a voice...";
            document.getElementById('audio-player-container').classList.add('hidden');
            
            const audioPlayer = document.getElementById('audio-player');
            audioPlayer.src = ""; 

            const { data, error } = await supabaseClient
                .from('goodbyes')
                .select('id, audio_url')
                .eq('is_approved', true);

            if (error || !data || data.length === 0) {
                document.getElementById('listen-status').innerText = "It is quiet right now. No goodbyes found.";
                return;
            }

            let playedIds = JSON.parse(sessionStorage.getItem('playedGoodbyes') || '[]');
            const unheardMessages = data.filter(msg => !playedIds.includes(msg.id));

            if (unheardMessages.length === 0) {
                document.getElementById('listen-status').innerText = "You have heard all the goodbyes for now. Rest well.";
                return;
            }

            const randomMsg = unheardMessages[Math.floor(Math.random() * unheardMessages.length)];
            playedIds.push(randomMsg.id);
            sessionStorage.setItem('playedGoodbyes', JSON.stringify(playedIds));

            audioPlayer.src = randomMsg.audio_url;
            document.getElementById('listen-status').innerText = "Listening to a stranger...";
            document.getElementById('audio-player-container').classList.remove('hidden');
            
            audioPlayer.onended = () => {
                document.getElementById('listen-status').innerText = "The message has ended.";
            };
        }
    </script>
</body>
</html>

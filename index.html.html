    <style>
        :root {
            --bg-warm: #F7F5F0;
            --text-dark: #2C2C2C;      
            --text-muted: #5A5A5A;     
            --accent-clay: #B68D77;
            --accent-glow: #D9B39F;
        }
        body {
            background-color: var(--bg-warm);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden; 
            position: relative;
        }
        .font-serif { font-family: 'Lora', serif; }
        
        .fade-in { animation: fadeIn 0.8s ease-in forwards; }
        .fade-out { animation: fadeOut 0.5s ease-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #timeline-container {
            width: 100%;
            height: 2px;
            background: rgba(182, 141, 119, 0.2);
            margin-top: 40px;
            border-radius: 2px;
            overflow: hidden;
        }
        #timeline-bar {
            height: 100%;
            width: 100%;
            background: var(--accent-clay);
            transform-origin: left;
            transition: width 1s linear;
        }

        .ripple {
            border-radius: 50%;
            background: var(--accent-glow);
            animation: ripple-anim 3s infinite ease-in-out;
            opacity: 0.4;
        }
        @keyframes ripple-anim {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* --- WATERCOLOR FLOWER STYLES --- */
        .flower-container {
            position: absolute;
            z-index: 0;
            pointer-events: auto; 
            cursor: pointer;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.03));
        }
        .flower-container:hover { transform: scale(1.08) rotate(10deg); }
        .watercolor-petal { mix-blend-mode: multiply; }
        main { position: relative; z-index: 10; }
    </style>
</head>

    <main id="view-landing" class="text-center max-w-md w-full flex flex-col items-center fade-in">
        <h1 class="font-serif text-3xl md:text-4xl tracking-wide text-[var(--text-dark)] mb-4">Bhal Thakibi!</h1>
        <p class="font-serif text-[var(--text-muted)] text-lg mb-16">Some words are too heavy to carry alone.<br>Leave them here.</p>
        
        <div class="flex flex-col gap-6 w-full px-8">
            <button onclick="switchView('view-speak')" class="py-4 border border-[var(--accent-clay)] text-[var(--accent-clay)] rounded-full tracking-widest uppercase text-xs font-medium hover:bg-[var(--accent-clay)] hover:text-[#F7F5F0] transition-colors duration-500 bg-white/30 backdrop-blur-sm">
                Speak
            </button>
            <button onclick="switchView('view-listen')" class="py-4 text-[var(--text-muted)] rounded-full tracking-widest uppercase text-xs font-medium hover:text-[var(--text-dark)] transition-colors duration-500 bg-white/30 backdrop-blur-sm">
                Listen
            </button>
        </div>
    </main>

    <main id="view-speak" class="hidden text-center max-w-md w-full flex-col items-center fade-in bg-white/20 backdrop-blur-sm p-8 rounded-3xl">
        <p id="record-prompt" class="font-serif text-[var(--text-muted)] text-lg mb-16 h-12">
            Take a deep breath.<br>You have 60 seconds. No one knows who you are.
        </p>

        <button id="record-btn" onclick="toggleRecording()" class="w-24 h-24 rounded-full bg-[var(--accent-clay)] shadow-[0_0_20px_rgba(182,141,119,0.3)] flex items-center justify-center transition-all duration-500 hover:scale-105 group relative">
            <div id="record-inner" class="w-8 h-8 bg-[#F7F5F0] rounded-full transition-all duration-300"></div>
        </button>
        <p id="record-status" class="mt-8 text-xs tracking-widest uppercase text-[var(--accent-clay)] opacity-0 transition-opacity duration-500">Recording...</p>

        <div id="timeline-container" class="opacity-0 transition-opacity duration-500">
            <div id="timeline-bar"></div>
        </div>

        <button onclick="cancelAction()" id="cancel-btn" class="mt-12 text-[var(--text-muted)] tracking-widest uppercase text-[10px] font-medium hover:text-[var(--text-dark)] transition-colors">Cancel</button>
    </main>

    <main id="view-success" class="hidden text-center max-w-md w-full flex-col items-center fade-in bg-white/30 backdrop-blur-sm p-8 rounded-3xl">
        <p class="font-serif text-[var(--text-dark)] text-xl mb-12 leading-relaxed">
            Your words have been heard.<br>They are safe here.
        </p>
        <button onclick="switchView('view-landing')" class="py-3 px-8 border border-[var(--accent-clay)] text-[var(--accent-clay)] rounded-full tracking-widest uppercase text-[10px] font-medium hover:bg-[var(--accent-clay)] hover:text-[#F7F5F0] transition-colors duration-500">
            Return
        </button>
    </main>

    <main id="view-listen" class="hidden text-center max-w-md w-full flex-col items-center justify-center h-full fade-in relative bg-white/20 backdrop-blur-sm p-8 rounded-3xl">
        <button onclick="leaveListenMode()" class="absolute top-6 left-6 text-[var(--text-muted)] tracking-widest uppercase text-[10px] font-medium hover:text-[var(--text-dark)] transition-colors flex items-center gap-2 z-20">
            ← Back
        </button>

        <div class="relative w-32 h-32 flex items-center justify-center mb-12 mt-16">
            <div class="absolute w-full h-full ripple"></div>
            <div class="absolute w-20 h-20 rounded-full bg-[var(--accent-glow)] opacity-50"></div>
        </div>
        <p id="listen-status" class="font-serif text-[var(--text-muted)] text-lg mb-16">Listening to the void...</p>
    </main>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHAL PRA THAKIBI DEH!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #3bdce2; color: #FFFFFF; font-family: ui-sans-serif, system-ui, sans-serif; }
        .hidden { display: none !important; }
        .title-font { font-family: 'Montserrat', sans-serif; font-weight: 900; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative p-6">

    <div id="home-screen" class="text-center w-full max-w-3xl flex flex-col items-center justify-center">
        <div class="space-y-4 mb-12 w-full overflow-hidden">
            <h1 class="text-2xl sm:text-4xl md:text-5xl lg:text-6xl tracking-tight uppercase text-white title-font leading-none whitespace-nowrap">BHAL PRA THAKIBI DEH!</h1>
            <p class="text-xl md:text-2xl text-white font-medium tracking-wide">A place to say goodbye</p>
        </div>
        <div class="flex flex-col sm:flex-row gap-6 justify-center items-center w-full sm:w-auto">
            <button onclick="showScreen('record-screen')" class="px-8 py-4 w-full sm:w-auto border border-white rounded-full hover:bg-white hover:text-[#3bdce2] transition-all duration-300 text-white font-medium text-lg">
                Say your goodbye
            </button>
            <button onclick="showScreen('listen-screen'); fetchRandomGoodbye();" class="px-8 py-4 w-full sm:w-auto border border-white rounded-full hover:bg-white hover:text-[#3bdce2] transition-all duration-300 text-white font-medium text-lg">
                Hear a stranger's goodbye
            </button>
        </div>
        <div class="mt-20 space-y-4">
            <p class="text-base md:text-lg text-white font-normal tracking-wide">Anonymous. No account. No data. Just your voice.</p>
            <p class="text-xs sm:text-sm text-white italic font-light tracking-wide pt-2 opacity-95">
                In loving memory of my dearest sister Liethonuo "Sunny" Kiewhuo 1992-2026
            </p>
        </div>
    </div>

    <div id="record-screen" class="hidden flex flex-col items-center justify-center w-full max-w-md h-full">
        <button onclick="showScreen('home-screen')" class="absolute top-8 left-8 text-base tracking-wide text-white hover:opacity-60 transition-opacity">← Back</button>
        
        <h2 class="text-3xl md:text-4xl font-normal tracking-wide mb-12 text-white">Say your goodbye</h2>
        
        <div id="progress-container" class="w-64 h-0.5 bg-white/25 rounded-full mb-12 opacity-0 transition-opacity duration-300">
            <div id="progress-bar" class="h-full bg-white w-full transition-all duration-1000 ease-linear rounded-full"></div>
        </div>
        
        <div class="h-32 flex items-center justify-center mb-12">
            <button id="start-btn" onclick="startRecording()" class="w-20 h-20 bg-white rounded-full hover:scale-105 transition-transform shadow-md" aria-label="Start recording"></button>
            <button id="stop-btn" onclick="stopRecording()" class="hidden w-16 h-16 bg-white rounded-md animate-pulse shadow-md" aria-label="Stop recording"></button>
        </div>
        
        <p id="record-status" class="text-xl md:text-2xl text-white font-normal text-center px-4 leading-relaxed">Press the white circle to speak your heart</p>
    </div>

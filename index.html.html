    <script>
        // --- Supabase Initialization ---

            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (error) {

        }

        // --- Live Water Ripple Simulation Logic ---
        const waterCanvas = document.getElementById('water-canvas');
        const waterCtx = waterCanvas.getContext('2d');
        let ripples = [];

        function resizeWaterCanvas() {
            waterCanvas.width = window.innerWidth;
            waterCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeWaterCanvas);
        resizeWaterCanvas();

        let lastX = 0, lastY = 0;
        window.addEventListener('mousemove', (e) => {
            const distance = Math.hypot(e.clientX - lastX, e.clientY - lastY);
            if (distance > 18) { 
                ripples.push({
                    x: e.clientX,
                    y: e.clientY,
                    radius: 1,
                    maxRadius: window.innerWidth > 768 ? 130 : 85,
                    opacity: 0.35,
                    speed: 1.4
                });
                lastX = e.clientX;
                lastY = e.clientY;
            }
        });

        function animateWater() {
            waterCtx.clearRect(0, 0, waterCanvas.width, waterCanvas.height);
            for (let i = ripples.length - 1; i >= 0; i--) {
                let r = ripples[i];
                r.radius += r.speed;
                r.opacity = 0.35 * (1 - r.radius / r.maxRadius);
                
                if (r.opacity <= 0) {
                    ripples.splice(i, 1);
                    continue;
                }
                
                waterCtx.beginPath();
                waterCtx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                waterCtx.strokeStyle = `rgba(255, 255, 255, ${r.opacity})`;
                waterCtx.lineWidth = 2.5;
                waterCtx.stroke();

                if (r.radius > 18) {
                    waterCtx.beginPath();
                    waterCtx.arc(r.x, r.y, r.radius - 18, 0, Math.PI * 2);
                    waterCtx.strokeStyle = `rgba(255, 255, 255, ${r.opacity * 0.45})`;
                    waterCtx.lineWidth = 1.2;
                    waterCtx.stroke();
                }
            }
            requestAnimationFrame(animateWater);
        }
        animateWater();


        // --- Audio Waveform Visualizer Logic ---
        let audioCtx;
        let analyser;
        let source;
        let waveformCanvas;
        let waveformCtx;

        function initAudioVisualizer() {
            if (audioCtx) return; 
            
            const audioPlayer = document.getElementById('audio-player');
            waveformCanvas = document.getElementById('waveform-canvas');
            waveformCtx = waveformCanvas.getContext('2d');
            
            // Set scale bounds for high quality canvas definition
            waveformCanvas.width = 256;
            waveformCanvas.height = 64;

            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 64; // Keeps code handling a tight selection of clean bars
                
                source = audioCtx.createMediaElementSource(audioPlayer);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                
                drawWaveform();
            } catch (e) {
                console.error("Audio Context visualizer blocked:", e);
            }
        }

        function drawWaveform() {
            requestAnimationFrame(drawWaveform);
            if (!analyser || !waveformCtx) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const w = waveformCanvas.width;
            const h = waveformCanvas.height;
            waveformCtx.clearRect(0, 0, w, h);

            const barWidth = 5;
            const gap = 4;
            const totalBars = 16; 
            const startX = (w - (totalBars * (barWidth + gap))) / 2;

            waveformCtx.fillStyle = '#FFFFFF';

            for (let i = 0; i < totalBars; i++) {

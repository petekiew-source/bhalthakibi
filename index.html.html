<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhal Thakibi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-warm: #F7F5F0;
            --text-dark: #4A3F39;
            --accent-clay: #B68D77;
            --accent-glow: #D9B39F;
        }
        body {
            background-color: var(--bg-warm);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden; /* Prevents scrolling to keep it grounded */
        }
        .font-serif { font-family: 'Lora', serif; }
        
        /* Smooth transitions for changing screens */
        .fade-in { animation: fadeIn 0.8s ease-in forwards; }
        .fade-out { animation: fadeOut 0.5s ease-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* The shrinking 60-second timeline */
        #timeline-container {
            width: 100%;
            height: 2px;
            background: rgba(182, 141, 119, 0.2);
            margin-top: 40px;
            border-radius: 2px;
            overflow: hidden;
        }
        #timeline-bar {
            height: 100%;
            width: 100%;
            background: var(--accent-clay);
            transform-origin: left;
            transition: width 1s linear;
        }

        /* Subtle ripple for listening mode */
        .ripple {
            border-radius: 50%;
            background: var(--accent-glow);
            animation: ripple-anim 3s infinite ease-in-out;
            opacity: 0.4;
        }
        @keyframes ripple-anim {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 relative">

    <!-- VIEW 1: LANDING -->
    <main id="view-landing" class="text-center max-w-md w-full flex flex-col items-center fade-in">
        <h1 class="font-serif text-3xl md:text-4xl tracking-wide text-[#4A3F39] mb-4">Bhal Thakibi</h1>
        <p class="font-serif italic text-[#7A6B63] text-lg mb-16">Some words are too heavy to carry alone.<br>Leave them here.</p>
        
        <div class="flex flex-col gap-6 w-full px-8">
            <button onclick="switchView('view-speak')" class="py-4 border border-[#B68D77] text-[#B68D77] rounded-full tracking-widest uppercase text-xs font-medium hover:bg-[#B68D77] hover:text-[#F7F5F0] transition-colors duration-500">
                Speak
            </button>
            <button onclick="switchView('view-listen')" class="py-4 text-[#7A6B63] rounded-full tracking-widest uppercase text-xs font-medium hover:text-[#4A3F39] transition-colors duration-500">
                Listen
            </button>
        </div>
    </main>

    <!-- VIEW 2: SPEAK (RECORDING) -->
    <main id="view-speak" class="hidden text-center max-w-md w-full flex-col items-center fade-in">
        <p id="record-prompt" class="font-serif italic text-[#7A6B63] text-lg mb-16 h-12">
            Take a deep breath.<br>You have 60 seconds. No one knows who you are.
        </p>

        <!-- Record Button -->
        <button id="record-btn" onclick="toggleRecording()" class="w-24 h-24 rounded-full bg-[#B68D77] shadow-[0_0_20px_rgba(182,141,119,0.3)] flex items-center justify-center transition-all duration-500 hover:scale-105 group relative">
            <div id="record-inner" class="w-8 h-8 bg-[#F7F5F0] rounded-full transition-all duration-300"></div>
        </button>
        <p id="record-status" class="mt-8 text-xs tracking-widest uppercase text-[#B68D77] opacity-0 transition-opacity duration-500">Recording...</p>

        <!-- Visual Shrinking Timer -->
        <div id="timeline-container" class="opacity-0 transition-opacity duration-500">
            <div id="timeline-bar"></div>
        </div>

        <button onclick="cancelAction()" id="cancel-btn" class="mt-12 text-[#7A6B63] tracking-widest uppercase text-[10px] font-medium hover:text-[#4A3F39] transition-colors">Cancel</button>
    </main>

    <!-- VIEW 3: SUCCESS (POST-RECORDING) -->
    <main id="view-success" class="hidden text-center max-w-md w-full flex-col items-center fade-in">
        <p class="font-serif italic text-[#4A3F39] text-xl mb-12 leading-relaxed">
            Your words have been heard.<br>They are safe here.
        </p>
        <button onclick="switchView('view-landing')" class="py-3 px-8 border border-[#B68D77] text-[#B68D77] rounded-full tracking-widest uppercase text-[10px] font-medium hover:bg-[#B68D77] hover:text-[#F7F5F0] transition-colors duration-500">
            Return
        </button>
    </main>

    <!-- VIEW 4: LISTEN -->
    <main id="view-listen" class="hidden text-center max-w-md w-full flex-col items-center justify-center h-full fade-in relative">
        <div class="relative w-32 h-32 flex items-center justify-center mb-12">
            <div class="absolute w-full h-full ripple"></div>
            <div class="absolute w-20 h-20 rounded-full bg-[#D9B39F] opacity-50"></div>
        </div>
        <p class="font-serif italic text-[#7A6B63] text-lg mb-16">Listening to the void...</p>
        <button onclick="switchView('view-landing')" class="absolute bottom-10 text-[#7A6B63] tracking-widest uppercase text-[10px] font-medium hover:text-[#4A3F39] transition-colors">
            Leave quietly
        </button>
    </main>

    <script>
        // UI Navigation Logic
        const views = ['view-landing', 'view-speak', 'view-success', 'view-listen'];
        let isRecording = false;
        let recordingInterval;
        let timeLeft = 60;

        function switchView(targetId) {
            views.forEach(id => {
                const el = document.getElementById(id);
                if (id === targetId) {
                    el.classList.remove('hidden');
                    el.classList.add('flex');
                } else {
                    el.classList.add('hidden');
                    el.classList.remove('flex');
                }
            });
            // Reset recording state if leaving the speak screen
            if (targetId !== 'view-speak') resetRecordingUI();
        }

        function toggleRecording() {
            const innerBtn = document.getElementById('record-inner');
            const status = document.getElementById('record-status');
            const timeline = document.getElementById('timeline-container');
            const prompt = document.getElementById('record-prompt');
            const cancelBtn = document.getElementById('cancel-btn');

            if (!isRecording) {
                // START RECORDING (Mock logic for now)
                isRecording = true;
                
                // Animate button to a "Stop" square
                innerBtn.classList.remove('rounded-full');
                innerBtn.classList.add('rounded-sm', 'scale-75');
                
                // Show recording status and timeline
                status.classList.remove('opacity-0');
                status.classList.add('animate-pulse');
                timeline.classList.remove('opacity-0');
                prompt.style.opacity = '0';
                cancelBtn.style.opacity = '0'; // Hide cancel so they focus on speaking

                // Start Visual Timer
                timeLeft = 60;
                document.getElementById('timeline-bar').style.width = '100%';
                
                recordingInterval = setInterval(() => {
                    timeLeft--;
                    const percentage = (timeLeft / 60) * 100;
                    document.getElementById('timeline-bar').style.width = percentage + '%';

                    if (timeLeft <= 0) {
                        finishRecording();
                    }
                }, 1000);

            } else {
                // STOP RECORDING (Tapped before 60s)
                finishRecording();
            }
        }

        function finishRecording() {
            clearInterval(recordingInterval);
            isRecording = false;
            
            // Here is where we will eventually upload to Supabase
            // For now, we just transition to the success screen
            switchView('view-success');
        }

        function resetRecordingUI() {
            clearInterval(recordingInterval);
            isRecording = false;
            
            const innerBtn = document.getElementById('record-inner');
            innerBtn.classList.add('rounded-full');
            innerBtn.classList.remove('rounded-sm', 'scale-75');
            
            document.getElementById('record-status').classList.add('opacity-0');
            document.getElementById('record-status').classList.remove('animate-pulse');
            document.getElementById('timeline-container').classList.add('opacity-0');
            document.getElementById('timeline-bar').style.width = '100%';
            document.getElementById('record-prompt').style.opacity = '1';
            document.getElementById('cancel-btn').style.opacity = '1';
        }

        function cancelAction() {
            resetRecordingUI();
            switchView('view-landing');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhal pra thakiwi</title>
    <!-- We use Tailwind CSS for the beautiful styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- We bring in Supabase to handle the database and audio storage -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #FDFBF7; color: #3A3532; font-family: ui-sans-serif, system-ui, sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative p-6">

    <!-- SETUP: PUT YOUR SUPABASE KEYS HERE -->
    <script>
        // 🚨 REPLACE THESE TWO LINES WITH YOUR ACTUAL SUPABASE KEYS 🚨
        const SUPABASE_URL = 'YOUR_SUPABASE_URL_HERE';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    </script>

    <!-- ========================================== -->
    <!-- 1. HOME SCREEN -->
    <!-- ========================================== -->
    <div id="home-screen" class="text-center w-full max-w-2xl fade-in">
        <div class="space-y-4 mb-12">
            <h1 class="text-4xl md:text-5xl font-bold tracking-tight">Bhal pra thakiwi</h1>
            <p class="text-xl text-[#5A5552] font-light">A place to say goodbye</p>
        </div>
        <div class="flex flex-col sm:flex-row gap-6 justify-center items-center">
            <button onclick="showScreen('record-screen')" class="px-8 py-4 w-full sm:w-auto border border-[#3A3532] rounded-full hover:bg-[#3A3532] hover:text-[#FDFBF7] transition-all duration-300">
                Say your goodbye
            </button>
            <button onclick="showScreen('listen-screen'); fetchRandomGoodbye();" class="px-8 py-4 w-full sm:w-auto border border-[#3A3532] rounded-full hover:bg-[#3A3532] hover:text-[#FDFBF7] transition-all duration-300">
                Hear a stranger's goodbye
            </button>
        </div>
        <div class="mt-24">
            <p class="text-sm text-[#8A8582] tracking-wide">Anonymous. No account. No data. Just your voice.</p>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- 2. RECORDING SCREEN -->
    <!-- ========================================== -->
    <div id="record-screen" class="hidden flex-col items-center justify-center w-full max-w-md h-full">
        <button onclick="showScreen('home-screen')" class="absolute top-8 left-8 text-sm tracking-wide hover:opacity-60 transition-opacity">← Back</button>
        
        <h2 class="text-2xl font-light tracking-wide mb-8">Say your goodbye</h2>
        <div id="timer-display" class="text-6xl font-extralight tracking-tighter mb-12">90s</div>
        
        <div class="h-32 flex items-center justify-center mb-8">
            <button id="start-btn" onclick="startRecording()" class="w-20 h-20 bg-[#D9534F] rounded-full hover:scale-105 transition-transform shadow-md"></button>
            <button id="stop-btn" onclick="stopRecording()" class="hidden w-16 h-16 bg-[#3A3532] rounded-md animate-pulse shadow-md"></button>
        </div>
        
        <p id="record-status" class="text-[#8A8582] font-light">Ready to record</p>
    </div>

    <!-- ========================================== -->
    <!-- 3. LISTEN SCREEN -->
    <!-- ========================================== -->
    <div id="listen-screen" class="hidden flex-col items-center justify-center w-full max-w-md h-full">
        <button onclick="showScreen('home-screen')" class="absolute top-8 left-8 text-sm tracking-wide hover:opacity-60 transition-opacity">← Back</button>

        <p id="listen-status" class="text-xl text-[#5A5552] font-light tracking-wide mb-12">Finding a voice...</p>

        <div id="audio-player-container" class="hidden flex-col items-center w-full space-y-12">
            <audio id="audio-player" controls autoplay class="w-full"></audio>
            <button onclick="fetchRandomGoodbye()" class="px-6 py-2 text-sm border border-[#3A3532] rounded-full hover:bg-[#3A3532] hover:text-[#FDFBF7] transition-all duration-300">
                Hear another
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- JAVASCRIPT LOGIC -->
    <!-- ========================================== -->
    <script>
        // --- Navigation ---
        function showScreen(screenId) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('record-screen').classList.add('hidden');
            document.getElementById('listen-screen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
            document.getElementById(screenId).style.display = 'flex';
        }

        // --- Recording Logic ---
        let mediaRecorder;
        let audioChunks = [];
        let timerInterval;
        let timeLeft = 90;

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = handleUpload;
                
                document.getElementById('start-btn').classList.add('hidden');
                document.getElementById('stop-btn').classList.remove('hidden');
                document.getElementById('record-status').innerText = "Recording...";
                
                timeLeft = 90;
                document.getElementById('timer-display').innerText = timeLeft + 's';
                
                mediaRecorder.start();

                timerInterval = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timer-display').innerText = timeLeft + 's';
                    if (timeLeft <= 0) stopRecording();
                }, 1000);

            } catch (err) {
                document.getElementById('record-status').innerText = "Microphone access denied.";
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                clearInterval(timerInterval);
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                
                document.getElementById('stop-btn').classList.add('hidden');
                document.getElementById('start-btn').classList.remove('hidden');
                document.getElementById('record-status').innerText = "Uploading your goodbye...";
            }
        }

        async function handleUpload() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const fileName = Date.now() + '-' + Math.random().toString(36).substring(7) + '.webm';

            // Upload to Supabase Storage bucket named 'goodbyes'
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('goodbyes')
                .upload(fileName, audioBlob);

            if (uploadError) {
                document.getElementById('record-status').innerText = "Upload failed. Please try again.";
                return;
            }

            // Get the URL and save to database table 'goodbyes'
            const { data: urlData } = supabase.storage.from('goodbyes').getPublicUrl(fileName);
            const { error: dbError } = await supabase.from('goodbyes').insert([{ audio_url: urlData.publicUrl }]);

            if (dbError) {
                document.getElementById('record-status').innerText = "Error saving. Let me know.";
            } else {
                document.getElementById('record-status').innerText = "Your goodbye has been released into the world.";
                document.getElementById('timer-display').innerText = "90s";
            }
        }

        // --- Listening Logic ---
        async function fetchRandomGoodbye() {
            document.getElementById('listen-status').innerText = "Finding a voice...";
            document.getElementById('audio-player-container').classList.add('hidden');
            
            const audioPlayer = document.getElementById('audio-player');
            audioPlayer.src = ""; // Clear current audio

            const { data, error } = await supabase
                .from('goodbyes')
                .select('id, audio_url')
                .eq('is_approved', true);

            if (error || !data || data.length === 0) {
                document.getElementById('listen-status').innerText = "It is quiet right now. No goodbyes found.";
                return;
            }

            // Memory logic so we don't repeat
            let playedIds = JSON.parse(sessionStorage.getItem('playedGoodbyes') || '[]');
            const unheardMessages = data.filter(msg => !playedIds.includes(msg.id));

            if (unheardMessages.length === 0) {
                document.getElementById('listen-status').innerText = "You have heard all the goodbyes for now. Rest well.";
                return;
            }

            const randomMsg = unheardMessages[Math.floor(Math.random() * unheardMessages.length)];
            playedIds.push(randomMsg.id);
            sessionStorage.setItem('playedGoodbyes', JSON.stringify(playedIds));

            audioPlayer.src = randomMsg.audio_url;
            document.getElementById('listen-status').innerText = "Listening to a stranger...";
            document.getElementById('audio-player-container').classList.remove('hidden');
            document.getElementById('audio-player-container').style.display = 'flex';
            
            audioPlayer.onended = () => {
                document.getElementById('listen-status').innerText = "The message has ended.";
            };
        }
    </script>
</body>
</html>

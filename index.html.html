<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhal Thakibi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-warm: #F7F5F0;
            --text-dark: #2C2C2C;      /* Darker, solid text color */
            --text-muted: #5A5A5A;     /* Muted text color */
            --accent-clay: #B68D77;
            --accent-glow: #D9B39F;
        }
        body {
            background-color: var(--bg-warm);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden; 
        }
        .font-serif { font-family: 'Lora', serif; }
        
        .fade-in { animation: fadeIn 0.8s ease-in forwards; }
        .fade-out { animation: fadeOut 0.5s ease-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }

        #timeline-container {
            width: 100%;
            height: 2px;
            background: rgba(182, 141, 119, 0.2);
            margin-top: 40px;
            border-radius: 2px;
            overflow: hidden;
        }
        #timeline-bar {
            height: 100%;
            width: 100%;
            background: var(--accent-clay);
            transform-origin: left;
            transition: width 1s linear;
        }

        .ripple {
            border-radius: 50%;
            background: var(--accent-glow);
            animation: ripple-anim 3s infinite ease-in-out;
            opacity: 0.4;
        }
        @keyframes ripple-anim {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 relative">

    <!-- VIEW 1: LANDING -->
    <main id="view-landing" class="text-center max-w-md w-full flex flex-col items-center fade-in">
        <h1 class="font-serif text-3xl md:text-4xl tracking-wide text-[var(--text-dark)] mb-4">Bhal Thakibi</h1>
        <p class="font-serif text-[var(--text-muted)] text-lg mb-16">Some words are too heavy to carry alone.<br>Leave them here.</p>
        
        <div class="flex flex-col gap-6 w-full px-8">
            <button onclick="switchView('view-speak')" class="py-4 border border-[var(--accent-clay)] text-[var(--accent-clay)] rounded-full tracking-widest uppercase text-xs font-medium hover:bg-[var(--accent-clay)] hover:text-[#F7F5F0] transition-colors duration-500">
                Speak
            </button>
            <button onclick="switchView('view-listen')" class="py-4 text-[var(--text-muted)] rounded-full tracking-widest uppercase text-xs font-medium hover:text-[var(--text-dark)] transition-colors duration-500">
                Listen
            </button>
        </div>
    </main>

    <!-- VIEW 2: SPEAK (RECORDING) -->
    <main id="view-speak" class="hidden text-center max-w-md w-full flex-col items-center fade-in">
        <p id="record-prompt" class="font-serif text-[var(--text-muted)] text-lg mb-16 h-12">
            Take a deep breath.<br>You have 60 seconds. No one knows who you are.
        </p>

        <!-- Record Button -->
        <button id="record-btn" onclick="toggleRecording()" class="w-24 h-24 rounded-full bg-[var(--accent-clay)] shadow-[0_0_20px_rgba(182,141,119,0.3)] flex items-center justify-center transition-all duration-500 hover:scale-105 group relative">
            <div id="record-inner" class="w-8 h-8 bg-[#F7F5F0] rounded-full transition-all duration-300"></div>
        </button>
        <p id="record-status" class="mt-8 text-xs tracking-widest uppercase text-[var(--accent-clay)] opacity-0 transition-opacity duration-500">Recording...</p>

        <!-- Visual Shrinking Timer -->
        <div id="timeline-container" class="opacity-0 transition-opacity duration-500">
            <div id="timeline-bar"></div>
        </div>

        <button onclick="cancelAction()" id="cancel-btn" class="mt-12 text-[var(--text-muted)] tracking-widest uppercase text-[10px] font-medium hover:text-[var(--text-dark)] transition-colors">Cancel</button>
    </main>

    <!-- VIEW 3: SUCCESS (POST-RECORDING) -->
    <main id="view-success" class="hidden text-center max-w-md w-full flex-col items-center fade-in">
        <p class="font-serif text-[var(--text-dark)] text-xl mb-12 leading-relaxed">
            Your words have been heard.<br>They are safe here.
        </p>
        <button onclick="switchView('view-landing')" class="py-3 px-8 border border-[var(--accent-clay)] text-[var(--accent-clay)] rounded-full tracking-widest uppercase text-[10px] font-medium hover:bg-[var(--accent-clay)] hover:text-[#F7F5F0] transition-colors duration-500">
            Return
        </button>
    </main>

    <!-- VIEW 4: LISTEN -->
    <main id="view-listen" class="hidden text-center max-w-md w-full flex-col items-center justify-center h-full fade-in relative">
        <!-- New Back Button -->
        <button onclick="leaveListenMode()" class="absolute top-0 left-0 text-[var(--text-muted)] tracking-widest uppercase text-[10px] font-medium hover:text-[var(--text-dark)] transition-colors flex items-center gap-2">
            ← Back
        </button>

        <div class="relative w-32 h-32 flex items-center justify-center mb-12 mt-16">
            <div class="absolute w-full h-full ripple"></div>
            <div class="absolute w-20 h-20 rounded-full bg-[var(--accent-glow)] opacity-50"></div>
        </div>
        <p id="listen-status" class="font-serif text-[var(--text-muted)] text-lg mb-16">Listening to the void...</p>
    </main>

    <script>
        // UI Navigation Logic
        const views = ['view-landing', 'view-speak', 'view-success', 'view-listen'];
        let isRecording = false;
        let recordingInterval;
        let timeLeft = 60;

        // Audio Recording Variables
        let mediaRecorder;
        let audioChunks = [];
        let latestAudioUrl = null;
        let currentAudioPlayer = new Audio();

        function switchView(targetId) {
            views.forEach(id => {
                const el = document.getElementById(id);
                if (id === targetId) {
                    el.classList.remove('hidden');
                    el.classList.add('flex');
                } else {
                    el.classList.add('hidden');
                    el.classList.remove('flex');
                }
            });

            // If entering Listen mode, play the audio
            if (targetId === 'view-listen') {
                startListeningMode();
            }
        }

        async function toggleRecording() {
            const innerBtn = document.getElementById('record-inner');
            const status = document.getElementById('record-status');
            const timeline = document.getElementById('timeline-container');
            const prompt = document.getElementById('record-prompt');
            const cancelBtn = document.getElementById('cancel-btn');

            if (!isRecording) {
                try {
                    // Request Microphone Access
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        latestAudioUrl = URL.createObjectURL(audioBlob);
                        
                        // Stop all tracks to release the microphone
                        stream.getTracks().forEach(track => track.stop());
                        
                        switchView('view-success');
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    
                    // UI Changes for recording state
                    innerBtn.classList.remove('rounded-full');
                    innerBtn.classList.add('rounded-sm', 'scale-75');
                    status.classList.remove('opacity-0');
                    status.classList.add('animate-pulse');
                    timeline.classList.remove('opacity-0');
                    prompt.style.opacity = '0';
                    cancelBtn.style.opacity = '0';

                    // Timer Logic
                    timeLeft = 60;
                    document.getElementById('timeline-bar').style.width = '100%';
                    
                    recordingInterval = setInterval(() => {
                        timeLeft--;
                        const percentage = (timeLeft / 60) * 100;
                        document.getElementById('timeline-bar').style.width = percentage + '%';

                        if (timeLeft <= 0) {
                            finishRecording();
                        }
                    }, 1000);

                } catch (err) {
                    alert("Microphone access is required to record a message.");
                }

            } else {
                finishRecording();
            }
        }

        function finishRecording() {
            clearInterval(recordingInterval);
            isRecording = false;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }

        function resetRecordingUI() {
            clearInterval(recordingInterval);
            isRecording = false;
            
            const innerBtn = document.getElementById('record-inner');
            innerBtn.classList.add('rounded-full');
            innerBtn.classList.remove('rounded-sm', 'scale-75');
            
            document.getElementById('record-status').classList.add('opacity-0');
            document.getElementById('record-status').classList.remove('animate-pulse');
            document.getElementById('timeline-container').classList.add('opacity-0');
            document.getElementById('timeline-bar').style.width = '100%';
            document.getElementById('record-prompt').style.opacity = '1';
            document.getElementById('cancel-btn').style.opacity = '1';
        }

        function cancelAction() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            resetRecordingUI();
            switchView('view-landing');
        }

        // Playback Logic
        function startListeningMode() {
            const statusText = document.getElementById('listen-status');
            
            if (latestAudioUrl) {
                statusText.innerText = "Listening to a message...";
                currentAudioPlayer.src = latestAudioUrl;
                currentAudioPlayer.play();
                
                currentAudioPlayer.onended = () => {
                    statusText.innerText = "The message has faded. You can go back.";
                };
            } else {
                statusText.innerText = "The void is quiet. No recordings yet.";
            }
        }

        function leaveListenMode() {
            currentAudioPlayer.pause();
            currentAudioPlayer.currentTime = 0;
            switchView('view-landing');
        }
    </script>
</body>
</html>
